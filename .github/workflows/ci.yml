name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 8 * * Mon"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start containers
        run: docker compose up -d

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            curl -s http://localhost:9966/petclinic/api/owners && break
            echo "Waiting... attempt $i"
            sleep 5
          done

      - name: Wait for UI to be ready
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8080 && break
            echo "Waiting... attempt $i"
            sleep 5
          done

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run all tests (UI + API)
        run: dotnet test --logger "trx;LogFileName=test-results.trx" --logger "html;logfilename=test-report.html"

      - name: Upload TRX results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-test-results-trx
          path: "**/TestResults/test-results.trx"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-test-results-html
          path: "**/TestResults/test-report.html"

      - name: Stop containers
        if: always()
        run: docker compose down